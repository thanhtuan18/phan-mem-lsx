<script>
    // Hàm hiển thị log debug ngay trên màn hình (thay vì chỉ console)
    function logDebug(message, isError = false) {
        const errorBox = document.getElementById('error-box');
        if (errorBox) {
            errorBox.style.display = 'block';
            errorBox.style.padding = '10px';
            errorBox.style.whiteSpace = 'pre-wrap';
            errorBox.style.textAlign = 'left';
            errorBox.style.fontSize = '12px';
            errorBox.style.backgroundColor = isError ? '#ffebee' : '#e8f5e9';
            errorBox.style.color = isError ? '#c62828' : '#2e7d32';
            errorBox.innerHTML += `> ${message}\n`;
        }
        console.log(`[DEBUG]: ${message}`);
    }

    async function handleLogin() {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value.trim();
        const btn = document.getElementById('login-btn');
        const errBox = document.getElementById('error-box');

        // Reset thông báo lỗi
        if(errBox) errBox.innerHTML = "";
        logDebug("Bắt đầu thực hiện handleLogin...");

        if (!u || !p) {
            logDebug("LỖI: Chưa nhập User hoặc Pass", true);
            return;
        }

        btn.innerText = "ĐANG XÁC THỰC...";
        btn.disabled = true;

        try {
            const API_URL = 'https://tiendosanxuat.technoup.info/api/auth/login';
            logDebug(`Đang gửi yêu cầu tới: ${API_URL}`);
            
            // 1. Kiểm tra kết nối HTTPS cơ bản
            logDebug("Kiểm tra kết nối mạng (Network check)...");

            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });

            logDebug(`Server phản hồi: HTTP ${response.status} (${response.statusText})`);

            const result = await response.json();
            logDebug(`Nội dung phản hồi: ${JSON.stringify(result)}`);

            if (response.ok && result.status === "success") {
                logDebug("ĐĂNG NHẬP THÀNH CÔNG! Đang lưu session...");
                localStorage.setItem('user_logged', JSON.stringify({
                    ...result.user,
                    token: result.token,
                    refresh_token: result.refresh_token
                }));
                setTimeout(() => location.reload(), 1000);
            } else {
                logDebug(`Backend từ chối: ${result.message || 'Lỗi không xác định'}`, true);
            }

        } catch (e) {
            // ĐOẠN NÀY SẼ CHỈ RA CHÍNH XÁC NGUYÊN NHÂN
            logDebug("--- PHÂN TÍCH LỖI KẾT NỐI ---", true);
            logDebug(`Tên lỗi: ${e.name}`, true);
            logDebug(`Chi tiết: ${e.message}`, true);

            if (e.name === 'TypeError' && e.message.includes('fetch')) {
                logDebug("CHẨN ĐOÁN: Có thể do lỗi SSL/HTTPS hoặc CORS.", true);
                logDebug("Hành động: Hãy mở tab mới truy cập trực tiếp link API xem có báo 'Site unsafe' không.", true);
            }
            
            console.error("Full Error Object:", e);
        } finally {
            btn.innerText = "ĐĂNG NHẬP";
            btn.disabled = false;
        }
    }

    // Tự động kiểm tra trạng thái ngay khi mở trang
    document.addEventListener('DOMContentLoaded', () => {
        logDebug("Hệ thống khởi động. Trạng thái: Sẵn sàng.");
        logDebug(`Tên miền hiện tại: ${window.location.hostname}`);
        logDebug(`Giao thức: ${window.location.protocol}`);
        
        if (window.location.protocol !== 'https:') {
            logDebug("CẢNH BÁO: Bạn không dùng HTTPS, trình duyệt sẽ chặn yêu cầu tới API!", true);
        }
    });
</script>
