<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý LSX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-screen" style="display: none;">
    <div class="login-card">
        <h2>QUẢN LÝ SẢN XUẤT</h2>
        <div id="error-box" class="error-msg"></div>
        <div class="form-group">
            <label>Tên đăng nhập</label>
            <input type="text" id="user" placeholder="Nhập tài khoản">
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="pass" placeholder="Nhập mật khẩu">
        </div>
        <button id="login-btn" onclick="handleLogin()">ĐĂNG NHẬP</button>
    </div>
</div>

<div class="app-container" id="main-app" style="display: none;">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h3>BỘ LỌC TÌM KIẾM</h3>
            <a href="#" onclick="logout()" style="font-size: 11px; color: red;">Đăng xuất</a>
        </div>
        
        <div class="filter-box">
            <input type="text" id="filter-lsx" placeholder="Tìm LSX, Sản phẩm, Ghi chú...">
            <input type="text" id="filter-customer" placeholder="Theo khách hàng...">
            <select id="filter-stage">
                <option value="">-- Tất cả công đoạn --</option>
                <option value="cut">Cắt vải</option>
                <option value="sew">May thành phẩm</option>
                <option value="qc">Kiểm tra QC</option>
            </select>
            <div class="date-range-group">
                <div class="date-item">
                    <label>Từ ngày:</label>
                    <input type="date" id="filter-date-from">
                </div>
                <div class="date-item">
                    <label>Đến ngày:</label>
                    <input type="date" id="filter-date-to">
                </div>
            </div>
        </div>

        <div class="lsx-list-container">
            <div class="list-header-flex">
                <div class="list-label">DANH SÁCH LỆNH SẢN XUẤT</div>
                <button class="btn-add-main" onclick="prepareAddNew()">+ THÊM MỚI</button>
            </div>
            <div class="lsx-list" id="lsx-list-items"></div>
        </div>
    </aside>

    <main class="main-editor">
        <header class="editor-header">
            <div class="title-group">
                <h1>CHI TIẾT: <span id="display-lsx-title">---</span></h1>
                <p id="display-sub-info">Chế độ: <strong id="mode-text">Đang tải...</strong></p>
            </div>
            <div class="header-actions">
                <button class="btn-secondary" onclick="cancelAction()">HỦY BỎ</button>
                <button class="btn-primary" onclick="saveData()">LƯU DỮ LIỆU</button>
            </div>
        </header>

        <section class="form-card master-card">
            <div class="card-header">Thông tin Lệnh sản xuất (Master)</div>
            <div class="form-grid">
                <div class="field">
                    <label>Ngày LSX (Chỉ xem)</label>
                    <input type="text" id="master-date" readonly class="readonly-field" value="---">
                </div>
                <div class="field">
                    <label>Mã Lệnh sản xuất (LSX)</label>
                    <input type="text" id="master-lsx-code" readonly class="readonly-field">
                </div>
                <div class="field">
                    <label>Khách hàng</label>
                    <input type="text" id="master-customer" placeholder="Nhập tên khách hàng...">
                </div>
                <div class="field">
                    <label>Sản phẩm</label>
                    <input type="text" id="master-product" placeholder="Tên sản phẩm...">
                </div>
                <div class="field">
                    <label>Trạng thái LSX</label>
                    <select id="master-status">
                        <option value="Chưa thực hiện">Chưa thực hiện</option>
                        <option value="Đang thực hiện">Đang thực hiện</option>
                        <option value="Hoàn thành">Hoàn thành</option>
                        <option value="Hủy">Hủy</option>
                    </select>
                </div>
                <div class="field">
                    <label>Ghi chú Lệnh sản xuất</label>
                    <input type="text" id="master-note" placeholder="Ghi chú quan trọng cho lệnh này...">
                </div>
            </div>
        </section>

        <section class="form-card detail-card">
            <div class="card-header-flex">
                <span>Dữ liệu thống kê công đoạn (Detail)</span>
                <button class="btn-add" onclick="addNewRow()">+ Thêm công đoạn</button>
            </div>
            <div class="table-container">
                <table class="detail-table">
                    <thead>
                        <tr>
                            <th width="12%">Ngày thống kê</th>
                            <th width="15%">Người thống kê</th>
                            <th width="15%">Mã công đoạn</th>
                            <th width="10%">SL Mục tiêu</th>
                            <th width="10%">SL Thực tế</th>
                            <th width="8%">Tỉ lệ %</th>
                            <th width="15%">Trạng thái CĐ</th>
                            <th width="5%"></th>
                        </tr>
                    </thead>
                    <tbody id="detail-body"></tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<!-- <script src="script.js"></script> -->
<script>
    const API_BASE = 'https://api-sx.technoup.info/api';

    // 1. Kiểm tra trạng thái đăng nhập khi load trang
    document.addEventListener('DOMContentLoaded', async () => {
        const userLoggedStr = localStorage.getItem('user_logged');
        if (!userLoggedStr) {
            showLogin(true);
            return;
        }

        try {
            let userData = JSON.parse(userLoggedStr);
            const payload = JSON.parse(atob(userData.token.split('.')[1]));
            const now = Math.floor(Date.now() / 1000);

            if (payload.exp < (now + 300)) { // Làm mới nếu còn dưới 5 phút
                const res = await fetch(`${API_BASE}/auth/refresh`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refresh_token: userData.refresh_token })
                });

                const result = await res.json();
                if (result.status === "success") {
                    userData.token = result.token;
                    localStorage.setItem('user_logged', JSON.stringify(userData));
                } else {
                    logoutForced();
                    return;
                }
            }

        // Nếu mọi thứ ổn, vào app
        showLogin(false);
            fetchLSXList();
        } catch (e) {
            console.error("Auth check error:", e);
            logoutForced();
        }
    });

    function showLogin(isLogin) {
        document.getElementById('login-screen').style.display = isLogin ? 'flex' : 'none';
        document.getElementById('main-app').style.display = isLogin ? 'none' : 'flex';
    }

    function logoutForced() {
        alert("Phiên làm việc đã kết thúc sau 7 ngày. Vui lòng đăng nhập lại.");
        localStorage.removeItem('user_logged');
        location.reload();
    }

    // 2. Hàm đăng xuất
    function logout() {
        if(confirm("Bạn muốn đăng xuất?")) {
            localStorage.removeItem('user_logged');
            location.reload();
        }
    }

    // 3. Xử lý Đăng nhập tương thích với Flask API
    async function handleLogin() {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value.trim();
        const btn = document.getElementById('login-btn');
        const err = document.getElementById('error-box');

        if (!u || !p) { alert("Vui lòng nhập đủ tài khoản và mật khẩu!"); return; }
        
        btn.innerText = "Đang xác thực...";
        btn.disabled = true;
        if(err) err.style.display = 'none';

        try {
            // ĐƯỜNG DẪN MỚI: Trỏ về subdomain chứa Flask App của bạn
            const response = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: u, 
                    password: p
                })
            });

            const result = await response.json();

            if (result.status === "success") {
                // LƯU Ý: Lưu cả thông tin user và TOKEN vào localStorage
                // Chúng ta gộp token vào object user để các hàm cũ không bị lỗi
                const userData = {
                    ...result.user,
                    token: result.token,
                    refresh_token: result.refresh_token // PHẢI LƯU THÊM DÒNG NÀY
                };
                localStorage.setItem('user_logged', JSON.stringify(userData));
                location.reload(); 
            } else {
                if(err) { 
                    err.innerText = result.message || "Tài khoản hoặc mật khẩu không chính xác!"; 
                    err.style.display = 'block'; 
                }
            }
        } catch (e) {
            console.error("Login Error:", e);
            alert("Lỗi kết nối máy chủ Flask!");
        } finally {
            btn.innerText = "ĐĂNG NHẬP";
            btn.disabled = false;
        }
    }

    // 3. Lấy danh sách LSX (Có bắt lỗi 401)
    async function fetchLSXList() {
        const userData = JSON.parse(localStorage.getItem('user_logged'));
        try {
            const res = await fetch(`${API_BASE}/lsx/list`, {
                headers: { 'Authorization': `Bearer ${userData.token}` }
            });
            
            if (res.status === 401) return logoutForced();

            const result = await res.json();
            if (result.status === "success" && typeof renderLSXList === "function") {
                renderLSXList(result.data);
            }
        } catch (e) { console.error("Lỗi tải danh sách:", e); }
    }

    // --- BỔ SUNG: Hiển thị danh sách lên Sidebar ---
    function renderLSXList(data) {
        const container = document.getElementById('lsx-list-items');
        container.innerHTML = '';
        data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'lsx-item'; // Hãy đảm bảo có class này trong style.css
            div.setAttribute('data-customer', (item.customer_name || '').toLowerCase());
            div.setAttribute('data-status', (item.status || '').toLowerCase());
            div.setAttribute('data-date', item.created_at || ''); // Giả định định dạng YYYY-MM-DD

            div.style = "padding:10px; border-bottom:1px solid #eee; cursor:pointer";
            div.onclick = () => loadDetail(item.id);
            div.innerHTML = `
                <div style="font-weight:600">${item.lsx_code}</div>
                <div style="font-size:12px; color:#666">${item.customer_name || 'Khách lẻ'}</div>
            `;
            container.appendChild(div);
        });
    }

    function addNewRow() {
        console.group("--- DEBUG TẠO DÒNG MỚI ---");
        let now = new Date();
        console.log("Thời gian hệ thống JS:", now.toString());
        
        // Cách tạo chuỗi YYYY-MM-DD an toàn nhất
        let year = now.getFullYear();
        let month = String(now.getMonth() + 1).padStart(2, '0');
        let day = String(now.getDate()).padStart(2, '0');
        let safeDate = `${year}-${month}-${day}`;
        
        console.log("Chuỗi ngày đề xuất gán vào Input:", safeDate);
        
        // Tìm ô input vừa được tạo ra
        // Giả sử bạn vừa chèn HTML vào bảng, hãy log nó ra
        setTimeout(() => {
            const lastInput = document.querySelector('tr:last-child .ngay-thong-ke-input');
            if (lastInput) {
                console.log("Đã tìm thấy Input mới. Giá trị hiện tại:", lastInput.value);
                lastInput.value = safeDate;
                console.log("Đã thử gán lại safeDate. Giá trị mới:", lastInput.value);
            } else {
                console.error("Không tìm thấy Input sau khi chèn HTML!");
            }
        }, 50); // Chờ 50ms để DOM kịp render
        
        console.groupEnd();
    }

    // --- BỔ SUNG: Tải chi tiết 1 LSX ---
    async function loadDetail(id) {
        const userData = JSON.parse(localStorage.getItem('user_logged'));
        console.group(`--- DEBUG LOAD DETAIL LSX ID: ${id} ---`); // Gom nhóm log cho dễ nhìn

        try {
            const res = await fetch(`${API_BASE}/lsx/detail/${id}`, {
                headers: { 'Authorization': `Bearer ${userData.token}` }
            });
            const result = await res.json();
            
            console.log("1. Dữ liệu thô từ API (result.details):", result.details);

            const master = result.master;
            const details = result.details;

            // --- Debug Master ---
            document.getElementById('display-lsx-title').innerText = master.lsx_code;
            document.getElementById('mode-text').innerText = "Chỉnh sửa";
            document.getElementById('master-lsx-code').value = master.lsx_code;
            document.getElementById('master-customer').value = master.customer_name;
            document.getElementById('master-product').value = master.product_name;
            document.getElementById('master-status').value = master.status;
            document.getElementById('master-note').value = master.note;

            let masterDateRaw = master.created_at;
            let masterDateClean = masterDateRaw ? masterDateRaw.split(' ')[0] : '---';
            console.log(`2. Master Date: Gốc [${masterDateRaw}] | Sau xử lý [${masterDateClean}]`);
            document.getElementById('master-date').value = masterDateClean;

            // --- Debug Detail Body ---
            const tbody = document.getElementById('detail-body');
            tbody.innerHTML = '';
            console.log(`3. Bắt đầu vẽ ${details.length} dòng Detail...`);

            details.forEach((d, index) => {
                console.group(`Dòng [${index}]`);
                console.log("Dữ liệu record_date gốc:", d.record_date);
                
                // Gọi hàm addNewRow và truyền dữ liệu vào
                addNewRow(d); 

                // Kiểm tra ngay lập tức xem Input trong DOM có nhận đúng giá trị không
                // Chúng ta dùng setTimeout để đợi trình duyệt vẽ xong HTML (render)
                setTimeout(() => {
                    const rows = tbody.querySelectorAll('tr');
                    const lastRow = rows[rows.length - 1];
                    const dateInput = lastRow.querySelector('input[type="date"]');
                    
                    if (dateInput) {
                        console.log(`-> Giá trị trong Input sau khi render: "${dateInput.value}"`);
                        if (dateInput.value === "") {
                            console.error("!!! CẢNH BÁO: Input bị trống. Có thể giá trị truyền vào không đúng định dạng YYYY-MM-DD.");
                        }
                    } else {
                        console.error("!!! LỖI: Không tìm thấy ô input ngày tháng trong dòng vừa tạo.");
                    }
                }, 50);
                console.groupEnd();
            });

        } catch (e) { 
            console.error("LỖI THỰC THI loadDetail:", e);
            alert("Lỗi tải chi tiết! Xem console để biết thêm."); 
        } finally {
            console.groupEnd();
        }
    }

    // --- BỔ SUNG: Chế độ thêm mới ---
    function prepareAddNew() {
        document.getElementById('display-lsx-title').innerText = "TẠO MỚI";
        document.getElementById('mode-text').innerText = "Thêm mới";
        
        // Chỉ xóa các ô nhập liệu Master
        document.getElementById('master-customer').value = '';
        document.getElementById('master-product').value = '';
        document.getElementById('master-note').value = '';
        document.getElementById('master-status').value = 'Chưa thực hiện';
        
        // Làm trống bảng chi tiết
        document.getElementById('detail-body').innerHTML = '';
        
        // Gán mã và ngày mới
        document.getElementById('master-lsx-code').value = "LSX-" + Date.now().toString().slice(-6);
        // FIX TẠI ĐÂY: Dùng định dạng YYYY-MM-DD cho input date
        // const today = new Date().toISOString().split('T')[0];

        document.getElementById('master-date').value = new Date().toLocaleDateString('vi-VN');
    }

    function cancelAction() {
        if(confirm("Hủy bỏ thay đổi?")) fetchLSXList();
    }

    // 4. Lưu dữ liệu (Đã sửa để lấy cả dữ liệu bảng Detail)
    function saveData() {
        console.group("--- DEBUG QUÁ TRÌNH LƯU ---");
        const rows = document.querySelectorAll('#table-detail-body tr'); // Thay bằng ID chuẩn của bạn
        console.log("Số lượng dòng tìm thấy trong bảng:", rows.length);

        let dataToSave = [];

        rows.forEach((row, i) => {
            try {
                console.log(`Đang quét dòng thứ ${i}...`);
                
                // Debug từng trường một để biết cái nào bị 'undefined'
                const inputDate = row.querySelector('.ngay-thong-ke-input');
                const inputName = row.querySelector('.người-thong-ke-input'); // Kiểm tra lại class này
                
                if (!inputDate) console.warn(`Dòng ${i}: Không tìm thấy class .ngay-thong-ke-input`);
                
                const record = {
                    date: inputDate ? inputDate.value : null,
                    name: inputName ? inputName.value : null
                };

                console.log(`Dòng ${i} thu thập được:`, record);
                dataToSave.push(record);

            } catch (err) {
                console.error(`LỖI TẠI DÒNG ${i}:`, err.message);
                console.log("Cấu trúc HTML của dòng bị lỗi:", row.innerHTML);
            }
        });
        
        console.log("Gói tin cuối cùng chuẩn bị gửi đi:", dataToSave);
        console.groupEnd();
    }
    
    // BỔ SUNG: Code xử lý bộ lọc tìm kiếm nhanh
    // document.getElementById('filter-lsx').addEventListener('input', function(e) {
    //     const val = e.target.value.toLowerCase();
    //     const items = document.querySelectorAll('.lsx-item');
    //     items.forEach(item => {
    //         item.style.display = item.innerText.toLowerCase().includes(val) ? 'block' : 'none';
    //     });
    // });

    // --- THAY THẾ TOÀN BỘ ĐOẠN XỬ LÝ BỘ LỌC CUỐI FILE ---
    function applyFilters() {
        const searchVal = document.getElementById('filter-lsx').value.toLowerCase();
        const customerVal = document.getElementById('filter-customer').value.toLowerCase();
        const stageVal = document.getElementById('filter-stage').value.toLowerCase();
        const dateFrom = document.getElementById('filter-date-from').value;
        const dateTo = document.getElementById('filter-date-to').value;

        const items = document.querySelectorAll('.lsx-item');
        items.forEach(item => {
            const text = item.innerText.toLowerCase();
            const customer = item.getAttribute('data-customer');
            const status = item.getAttribute('data-status');
            const date = item.getAttribute('data-date').split(' ')[0]; // Lấy phần YYYY-MM-DD

            let visible = text.includes(searchVal) && customer.includes(customerVal);
            
            if (stageVal && !status.includes(stageVal)) visible = false;
            if (dateFrom && date < dateFrom) visible = false;
            if (dateTo && date > dateTo) visible = false;

            item.style.display = visible ? 'block' : 'none';
        });
    }

    // Gắn sự kiện cho tất cả các ô lọc
    ['filter-lsx', 'filter-customer', 'filter-stage', 'filter-date-from', 'filter-date-to'].forEach(id => {
        document.getElementById(id).addEventListener('input', applyFilters);
        document.getElementById(id).addEventListener('change', applyFilters);
    });

    // Hàm này giúp khi bạn gõ số đến đâu, % nhảy đến đấy
    function calcRate(el) {
        const row = el.closest('tr');
        const tg = parseFloat(row.querySelector('.tg-num').value) || 0;
        const ac = parseFloat(row.querySelector('.ac-num').value) || 0;
        const cell = row.querySelector('.rate-cell'); // Phải khớp với class ở Bước 1
        
        if (tg > 0) {
            cell.innerText = Math.round(ac / tg * 100) + '%';
        } else {
            cell.innerText = '0%';
        }
    }

</script>
</body>
</html>
