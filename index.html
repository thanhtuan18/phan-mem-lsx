<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý LSX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-screen" style="display: none;">
    <div class="login-card">
        <h2>QUẢN LÝ SẢN XUẤT</h2>
        <div id="error-box" class="error-msg"></div>
        <div class="form-group">
            <label>Tên đăng nhập</label>
            <input type="text" id="user" placeholder="Nhập tài khoản">
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="pass" placeholder="Nhập mật khẩu">
        </div>
        <button id="login-btn" onclick="handleLogin()">ĐĂNG NHẬP</button>
    </div>
</div>

<div class="app-container" id="main-app" style="display: none;">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h3>BỘ LỌC TÌM KIẾM</h3>
            <a href="#" onclick="logout()" style="font-size: 11px; color: red;">Đăng xuất</a>
        </div>
        
        <div class="filter-box">
            <input type="text" id="filter-lsx" placeholder="Tìm LSX, Sản phẩm, Ghi chú...">
            <input type="text" id="filter-customer" placeholder="Theo khách hàng...">
            <select id="filter-stage">
                <option value="">-- Tất cả công đoạn --</option>
                <option value="cut">Cắt vải</option>
                <option value="sew">May thành phẩm</option>
                <option value="qc">Kiểm tra QC</option>
            </select>
            <div class="date-range-group">
                <div class="date-item">
                    <label>Từ ngày:</label>
                    <input type="date" id="filter-date-from">
                </div>
                <div class="date-item">
                    <label>Đến ngày:</label>
                    <input type="date" id="filter-date-to">
                </div>
            </div>
        </div>

        <div class="lsx-list-container">
            <div class="list-header-flex">
                <div class="list-label">DANH SÁCH LỆNH SẢN XUẤT</div>
                <button class="btn-add-main" onclick="prepareAddNew()">+ THÊM MỚI</button>
            </div>
            <div class="lsx-list" id="lsx-list-items"></div>
        </div>
    </aside>

    <main class="main-editor">
        <header class="editor-header">
            <div class="title-group">
                <h1>CHI TIẾT: <span id="display-lsx-title">---</span></h1>
                <p id="display-sub-info">Chế độ: <strong id="mode-text">Đang tải...</strong></p>
            </div>
            <div class="header-actions">
                <button class="btn-secondary" onclick="cancelAction()">HỦY BỎ</button>
                <button class="btn-primary" onclick="saveData()">LƯU DỮ LIỆU</button>
            </div>
        </header>

        <section class="form-card master-card">
            <div class="card-header">Thông tin Lệnh sản xuất (Master)</div>
            <div class="form-grid">
                <div class="field">
                    <label>Ngày LSX (Chỉ xem)</label>
                    <input type="text" id="master-date" readonly class="readonly-field" value="---">
                </div>
                <div class="field">
                    <label>Mã Lệnh sản xuất (LSX)</label>
                    <input type="text" id="master-lsx-code" readonly class="readonly-field">
                </div>
                <div class="field">
                    <label>Khách hàng</label>
                    <input type="text" id="master-customer" placeholder="Nhập tên khách hàng...">
                </div>
                <div class="field">
                    <label>Sản phẩm</label>
                    <input type="text" id="master-product" placeholder="Tên sản phẩm...">
                </div>
                <div class="field">
                    <label>Trạng thái LSX</label>
                    <select id="master-status">
                        <option value="Chưa thực hiện">Chưa thực hiện</option>
                        <option value="Đang thực hiện">Đang thực hiện</option>
                        <option value="Hoàn thành">Hoàn thành</option>
                        <option value="Hủy">Hủy</option>
                    </select>
                </div>
                <div class="field">
                    <label>Ghi chú Lệnh sản xuất</label>
                    <input type="text" id="master-note" placeholder="Ghi chú quan trọng cho lệnh này...">
                </div>
            </div>
        </section>

        <section class="form-card detail-card">
            <div class="card-header-flex">
                <span>Dữ liệu thống kê công đoạn (Detail)</span>
                <button class="btn-add" onclick="addNewRow()">+ Thêm công đoạn</button>
            </div>
            <div class="table-container">
                <table class="detail-table">
                    <thead>
                        <tr>
                            <th width="12%">Ngày thống kê</th>
                            <th width="15%">Người thống kê</th>
                            <th width="15%">Mã công đoạn</th>
                            <th width="10%">SL Mục tiêu</th>
                            <th width="10%">SL Thực tế</th>
                            <th width="8%">Tỉ lệ %</th>
                            <th width="15%">Trạng thái CĐ</th>
                            <th width="5%"></th>
                        </tr>
                    </thead>
                    <tbody id="detail-body"></tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<script src="script.js"></script>
<script>
    const API_BASE = 'https://api-sx.technoup.info/api';

    // 1. Kiểm tra trạng thái đăng nhập khi load trang
    document.addEventListener('DOMContentLoaded', async () => {
        const userLoggedStr = localStorage.getItem('user_logged');
        if (!userLoggedStr) {
            showLogin(true);
            return;
        }

        try {
            let userData = JSON.parse(userLoggedStr);
            const payload = JSON.parse(atob(userData.token.split('.')[1]));
            const now = Math.floor(Date.now() / 1000);

            if (payload.exp < (now + 300)) { // Làm mới nếu còn dưới 5 phút
                const res = await fetch(`${API_BASE}/auth/refresh`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refresh_token: userData.refresh_token })
                });

                const result = await res.json();
                if (result.status === "success") {
                    userData.token = result.token;
                    localStorage.setItem('user_logged', JSON.stringify(userData));
                } else {
                    logoutForced();
                    return;
                }
            }

        // Nếu mọi thứ ổn, vào app
        showLogin(false);
            fetchLSXList();
        } catch (e) {
            console.error("Auth check error:", e);
            logoutForced();
        }
    });

    function showLogin(isLogin) {
        document.getElementById('login-screen').style.display = isLogin ? 'flex' : 'none';
        document.getElementById('main-app').style.display = isLogin ? 'none' : 'flex';
    }

    function logoutForced() {
        alert("Phiên làm việc đã kết thúc sau 7 ngày. Vui lòng đăng nhập lại.");
        localStorage.removeItem('user_logged');
        location.reload();
    }

    // 2. Hàm đăng xuất
    function logout() {
        if(confirm("Bạn muốn đăng xuất?")) {
            localStorage.removeItem('user_logged');
            location.reload();
        }
    }

    // 3. Xử lý Đăng nhập tương thích với Flask API
    async function handleLogin() {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value.trim();
        const btn = document.getElementById('login-btn');
        const err = document.getElementById('error-box');

        if (!u || !p) { alert("Vui lòng nhập đủ tài khoản và mật khẩu!"); return; }
        
        btn.innerText = "Đang xác thực...";
        btn.disabled = true;
        if(err) err.style.display = 'none';

        try {
            // ĐƯỜNG DẪN MỚI: Trỏ về subdomain chứa Flask App của bạn
            const response = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: u, 
                    password: p
                })
            });

            const result = await response.json();

            if (result.status === "success") {
                // LƯU Ý: Lưu cả thông tin user và TOKEN vào localStorage
                // Chúng ta gộp token vào object user để các hàm cũ không bị lỗi
                const userData = {
                    ...result.user,
                    token: result.token,
                    refresh_token: result.refresh_token // PHẢI LƯU THÊM DÒNG NÀY
                };
                localStorage.setItem('user_logged', JSON.stringify(userData));
                location.reload(); 
            } else {
                if(err) { 
                    err.innerText = result.message || "Tài khoản hoặc mật khẩu không chính xác!"; 
                    err.style.display = 'block'; 
                }
            }
        } catch (e) {
            console.error("Login Error:", e);
            alert("Lỗi kết nối máy chủ Flask!");
        } finally {
            btn.innerText = "ĐĂNG NHẬP";
            btn.disabled = false;
        }
    }

    // 3. Lấy danh sách LSX (Có bắt lỗi 401)
    async function fetchLSXList() {
        const userData = JSON.parse(localStorage.getItem('user_logged'));
        try {
            const res = await fetch(`${API_BASE}/lsx/list`, {
                headers: { 'Authorization': `Bearer ${userData.token}` }
            });
            
            if (res.status === 401) return logoutForced();

            const result = await res.json();
            if (result.status === "success" && typeof renderLSXList === "function") {
                renderLSXList(result.data);
            }
        } catch (e) { console.error("Lỗi tải danh sách:", e); }
    }

    // --- BỔ SUNG: Hiển thị danh sách lên Sidebar ---
    function renderLSXList(data) {
        const container = document.getElementById('lsx-list-items');
        container.innerHTML = '';
        data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'lsx-item'; // Hãy đảm bảo có class này trong style.css
            div.style = "padding:10px; border-bottom:1px solid #eee; cursor:pointer";
            div.onclick = () => loadDetail(item.id);
            div.innerHTML = `
                <div style="font-weight:600">${item.lsx_code}</div>
                <div style="font-size:12px; color:#666">${item.customer_name || 'Khách lẻ'}</div>
            `;
            container.appendChild(div);
        });
    }

    // --- BỔ SUNG: Thêm dòng vào bảng công đoạn ---
    function addNewRow(data = {}) {
        const tbody = document.getElementById('detail-body');
        const row = document.createElement('tr');
        row.innerHTML = `
            <td><input type="date" value="${data.record_date || ''}"></td>
            <td><input type="text" value="${data.recorder_name || ''}" placeholder="Tên..."></td>
            <td><input type="text" value="${data.stage_code || ''}" placeholder="CĐ..."></td>
            <td><input type="number" value="${data.target_quantity || 0}"></td>
            <td><input type="number" value="${data.actual_quantity || 0}"></td>
            <td>${data.target_quantity ? Math.round(data.actual_quantity/data.target_quantity*100) : 0}%</td>
            <td>
                <select>
                    <option value="Đang làm" ${data.stage_status==='Đang làm'?'selected':''}>Đang làm</option>
                    <option value="Hoàn thành" ${data.stage_status==='Hoàn thành'?'selected':''}>Hoàn thành</option>
                </select>
            </td>
            <td><button onclick="this.parentElement.parentElement.remove()" style="color:red; border:none; background:none; cursor:pointer">✕</button></td>
        `;
        tbody.appendChild(row);
    }

    // --- BỔ SUNG: Tải chi tiết 1 LSX ---
    async function loadDetail(id) {
        const userData = JSON.parse(localStorage.getItem('user_logged'));
        try {
            const res = await fetch(`${API_BASE}/lsx/detail/${id}`, {
                headers: { 'Authorization': `Bearer ${userData.token}` }
            });
            const result = await res.json();
            const master = result.master;
            const details = result.details;

            document.getElementById('display-lsx-title').innerText = master.lsx_code;
            document.getElementById('mode-text').innerText = "Chỉnh sửa";
            document.getElementById('master-lsx-code').value = master.lsx_code;
            document.getElementById('master-customer').value = master.customer_name;
            document.getElementById('master-product').value = master.product_name;
            document.getElementById('master-status').value = master.status;
            document.getElementById('master-note').value = master.note;
            document.getElementById('master-date').value = master.created_at || '---';

            const tbody = document.getElementById('detail-body');
            tbody.innerHTML = '';
            details.forEach(d => addNewRow(d));
        } catch (e) { alert("Lỗi tải chi tiết!"); }
    }

    // --- BỔ SUNG: Chế độ thêm mới ---
    function prepareAddNew() {
        document.getElementById('display-lsx-title').innerText = "TẠO MỚI";
        document.getElementById('mode-text').innerText = "Thêm mới";
        document.querySelectorAll('input').forEach(i => i.value = '');
        document.getElementById('detail-body').innerHTML = '';
        document.getElementById('master-lsx-code').value = "LSX-" + Date.now().toString().slice(-6);
    }

    function cancelAction() {
        if(confirm("Hủy bỏ thay đổi?")) fetchLSXList();
    }

    // 4. Lưu dữ liệu (Đã sửa để lấy cả dữ liệu bảng Detail)
    async function saveData() {
        const userData = JSON.parse(localStorage.getItem('user_logged'));
        const btn = document.querySelector('.btn-primary');
        
        // Thu thập thông tin Master
        const masterData = {
            lsx_code: document.getElementById('master-lsx-code').value,
            customer: document.getElementById('master-customer').value,
            product: document.getElementById('master-product').value,
            status: document.getElementById('master-status').value,
            note: document.getElementById('master-note').value
        };

        if(!masterData.lsx_code) return alert("Không có mã LSX để lưu!");

        // THU THẬP DỮ LIỆU DETAIL TỪ BẢNG (Chỗ này cực kỳ quan trọng)
        const details = [];
        const rows = document.querySelectorAll('#detail-body tr');
        rows.forEach(row => {
            const inputs = row.querySelectorAll('input, select');
            if (inputs.length > 0) {
                details.append({
                    date_stat: inputs[0].value,
                    worker: inputs[1].value,
                    stage_code: inputs[2].value,
                    target: inputs[3].value,
                    actual: inputs[4].value,
                    status_cd: inputs[6].value
                });
            }
        });

        const fullData = { ...masterData, details: details };

        btn.innerText = "ĐANG LƯU...";
        btn.disabled = true;

        try {
            const res = await fetch(`${API_BASE}/lsx/save`, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${userData.token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(fullData)
            });

            if (res.status === 401) return logoutForced();

            const result = await res.json();
            if(result.status === "success") {
                alert("Lưu thành công!");
                fetchLSXList();
            } else { alert("Lỗi: " + result.message); }
        } catch (e) { alert("Lỗi kết nối máy chủ!"); }
        finally { btn.innerText = "LƯU DỮ LIỆU"; btn.disabled = false; }
    }

</script>
</body>
</html>
