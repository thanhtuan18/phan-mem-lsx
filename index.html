<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý LSX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-screen" style="display: none;">
    <div class="login-card">
        <h2>QUẢN LÝ SẢN XUẤT</h2>
        <div id="error-box" class="error-msg"></div>
        <div class="form-group">
            <label>Tên đăng nhập</label>
            <input type="text" id="user" placeholder="Nhập tài khoản">
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="pass" placeholder="Nhập mật khẩu">
        </div>
        <button id="login-btn" onclick="handleLogin()">ĐĂNG NHẬP</button>
    </div>
</div>

<div class="app-container" id="main-app" style="display: none;">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h3>BỘ LỌC TÌM KIẾM</h3>
            <a href="#" onclick="logout()" style="font-size: 11px; color: red;">Đăng xuất</a>
        </div>
        
        <div class="filter-box">
            <input type="text" id="filter-lsx" placeholder="Tìm LSX, Sản phẩm, Ghi chú...">
            <input type="text" id="filter-customer" placeholder="Theo khách hàng...">
            <select id="filter-stage">
                <option value="">-- Tất cả công đoạn --</option>
                <option value="cut">Cắt vải</option>
                <option value="sew">May thành phẩm</option>
                <option value="qc">Kiểm tra QC</option>
            </select>
            <div class="date-range-group">
                <div class="date-item">
                    <label>Từ ngày:</label>
                    <input type="date" id="filter-date-from">
                </div>
                <div class="date-item">
                    <label>Đến ngày:</label>
                    <input type="date" id="filter-date-to">
                </div>
            </div>
        </div>

        <div class="lsx-list-container">
            <div class="list-header-flex">
                <div class="list-label">DANH SÁCH LỆNH SẢN XUẤT</div>
                <button class="btn-add-main" onclick="prepareAddNew()">+ THÊM MỚI</button>
            </div>
            <div class="lsx-list" id="lsx-list-items"></div>
        </div>
    </aside>

    <main class="main-editor">
        <header class="editor-header">
            <div class="title-group">
                <h1>CHI TIẾT: <span id="display-lsx-title">---</span></h1>
                <p id="display-sub-info">Chế độ: <strong id="mode-text">Đang tải...</strong></p>
            </div>
            <div class="header-actions">
                <button class="btn-secondary" onclick="cancelAction()">HỦY BỎ</button>
                <button class="btn-primary" onclick="saveData()">LƯU DỮ LIỆU</button>
            </div>
        </header>

        <section class="form-card master-card">
            <div class="card-header">Thông tin Lệnh sản xuất (Master)</div>
            <div class="form-grid">
                <div class="field">
                    <label>Ngày LSX (Chỉ xem)</label>
                    <input type="text" id="master-date" readonly class="readonly-field" value="---">
                </div>
                <div class="field">
                    <label>Mã Lệnh sản xuất (LSX)</label>
                    <input type="text" id="master-lsx-code" readonly class="readonly-field">
                </div>
                <div class="field">
                    <label>Khách hàng</label>
                    <input type="text" id="master-customer" placeholder="Nhập tên khách hàng...">
                </div>
                <div class="field">
                    <label>Sản phẩm</label>
                    <input type="text" id="master-product" placeholder="Tên sản phẩm...">
                </div>
                <div class="field">
                    <label>Trạng thái LSX</label>
                    <select id="master-status">
                        <option value="Chưa thực hiện">Chưa thực hiện</option>
                        <option value="Đang thực hiện">Đang thực hiện</option>
                        <option value="Hoàn thành">Hoàn thành</option>
                        <option value="Hủy">Hủy</option>
                    </select>
                </div>
                <div class="field">
                    <label>Ghi chú Lệnh sản xuất</label>
                    <input type="text" id="master-note" placeholder="Ghi chú quan trọng cho lệnh này...">
                </div>
            </div>
        </section>

        <section class="form-card detail-card">
            <div class="card-header-flex">
                <span>Dữ liệu thống kê công đoạn (Detail)</span>
                <button class="btn-add" onclick="addNewRow()">+ Thêm công đoạn</button>
            </div>
            <div class="table-container">
                <table class="detail-table">
                    <thead>
                        <tr>
                            <th width="12%">Ngày thống kê</th>
                            <th width="15%">Người thống kê</th>
                            <th width="15%">Mã công đoạn</th>
                            <th width="10%">SL Mục tiêu</th>
                            <th width="10%">SL Thực tế</th>
                            <th width="8%">Tỉ lệ %</th>
                            <th width="15%">Trạng thái CĐ</th>
                            <th width="5%"></th>
                        </tr>
                    </thead>
                    <tbody id="detail-body"></tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<!-- <script src="script.js"></script> -->
<script>
    const API_BASE = 'https://api-sx.technoup.info/api';

    // 1. Kiểm tra Auth (Giữ nguyên)
    document.addEventListener('DOMContentLoaded', async () => {
        const userLoggedStr = localStorage.getItem('user_logged');
        if (!userLoggedStr) { showLogin(true); return; }
        try {
            let userData = JSON.parse(userLoggedStr);
            showLogin(false);
            fetchLSXList();
        } catch (e) { logoutForced(); }
    });

    // 2. LOG DỮ LIỆU TỪ API CHI TIẾT
    async function loadDetail(id) {
        const userData = JSON.parse(localStorage.getItem('user_logged'));
        console.log(`--- [DEBUG] Đang tải chi tiết cho LSX ID: ${id} ---`);
        
        try {
            const res = await fetch(`${API_BASE}/lsx/detail/${id}`, {
                headers: { 'Authorization': `Bearer ${userData.token}` }
            });
            const result = await res.json();
            
            console.log("1. Dữ liệu thô từ API (result.details):", result.details);

            const master = result.master;
            const details = result.details;

            document.getElementById('display-lsx-title').innerText = master.lsx_code;
            document.getElementById('master-lsx-code').value = master.lsx_code;
            document.getElementById('master-customer').value = master.customer_name;
            document.getElementById('master-product').value = master.product_name;
            document.getElementById('master-status').value = master.status;
            document.getElementById('master-note').value = master.note;
            document.getElementById('master-date').value = master.created_at ? master.created_at.split(' ')[0] : '---';

            const tbody = document.getElementById('detail-body');
            tbody.innerHTML = '';

            // Kiểm tra từng dòng detail trước khi render
            details.forEach((d, index) => {
                console.log(`2. Dòng [${index}] - record_date gốc:`, `'${d.record_date}'`);
                addNewRow(d);
            });

        } catch (e) { 
            console.error("Critical Error trong loadDetail:", e);
            alert("Lỗi tải chi tiết!"); 
        }
    }

    // 3. LOG QUÁ TRÌNH ĐỔ VÀO INPUT DATE
    function addNewRow(data = {}) {
        const tbody = document.getElementById('detail-body');
        const row = document.createElement('tr');
        
        // Debug logic xử lý ngày
        let rawDate = data.record_date || '';
        let processedDate = '';
        
        if (rawDate) {
            // Thẻ <input type="date"> CHỈ CHẤP NHẬN định dạng: YYYY-MM-DD
            processedDate = rawDate.split(' ')[0]; // Tách bỏ phần giờ nếu có
            console.log(`   -> Debug Row: Gốc [${rawDate}] | Sau xử lý [${processedDate}]`);
        }

        row.innerHTML = `
            <td><input type="date" class="col-date" value="${processedDate}"></td>
            <td><input type="text" class="col-name" value="${data.recorder_name || ''}"></td>
            <td><input type="text" class="col-code" value="${data.stage_code || ''}"></td>
            <td><input type="number" class="col-tg tg-num" value="${data.target_quantity || 0}" oninput="calcRate(this)"></td>
            <td><input type="number" class="col-ac ac-num" value="${data.actual_quantity || 0}" oninput="calcRate(this)"></td>
            <td class="rate-cell">${data.target_quantity ? Math.round(data.actual_quantity/data.target_quantity*100) : 0}%</td>
            <td>
                <select class="col-status">
                    <option value="Đang làm" ${data.stage_status==='Đang làm'?'selected':''}>Đang làm</option>
                    <option value="Hoàn thành" ${data.stage_status==='Hoàn thành'?'selected':''}>Hoàn thành</option>
                </select>
            </td>
            <td><button type="button" onclick="this.closest('tr').remove()" style="color:red; border:none; background:none;">✕</button></td>
        `;
        tbody.appendChild(row);

        // Kiểm tra xem trình duyệt có chấp nhận giá trị đó không
        const lastInput = row.querySelector('.col-date');
        if (processedDate && lastInput.value === "") {
            console.warn(`   !!! LỖI: Trình duyệt từ chối giá trị "${processedDate}". Có thể sai định dạng YYYY-MM-DD.`);
        }
    }

    // --- CÁC HÀM BỔ TRỢ (GIỮ NGUYÊN) ---
    async function fetchLSXList() {
        const userData = JSON.parse(localStorage.getItem('user_logged'));
        const res = await fetch(`${API_BASE}/lsx/list`, { headers: { 'Authorization': `Bearer ${userData.token}` } });
        const result = await res.json();
        if (result.status === "success") renderLSXList(result.data);
    }

    function renderLSXList(data) {
        const container = document.getElementById('lsx-list-items');
        container.innerHTML = '';
        data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'lsx-item';
            div.style = "padding:10px; border-bottom:1px solid #eee; cursor:pointer";
            div.onclick = () => loadDetail(item.id);
            div.innerHTML = `<b>${item.lsx_code}</b><br><small>${item.customer_name || 'Khách lẻ'}</small>`;
            container.appendChild(div);
        });
    }

    function calcRate(el) {
        const row = el.closest('tr');
        const tg = parseFloat(row.querySelector('.tg-num').value) || 0;
        const ac = parseFloat(row.querySelector('.ac-num').value) || 0;
        row.querySelector('.rate-cell').innerText = tg > 0 ? Math.round(ac / tg * 100) + '%' : '0%';
    }

    function showLogin(isLogin) {
        document.getElementById('login-screen').style.display = isLogin ? 'flex' : 'none';
        document.getElementById('main-app').style.display = isLogin ? 'none' : 'flex';
    }
</script>
</body>
</html>
