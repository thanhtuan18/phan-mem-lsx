<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Hệ thống Quản lý LSX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f3f4f6;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h2 {
            color: var(--text-main);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #93c5fd;
            cursor: not-allowed;
        }

        .error-msg {
            background: #fef2f2;
            color: #b91c1c;
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            margin-bottom: 1.25rem;
            display: none;
            text-align: center;
            border: 1px solid #fee2e2;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="header">
        <h2>QUẢN LÝ SẢN XUẤT</h2>
        <p>Vui lòng đăng nhập để tiếp tục</p>
    </div>

    <div id="error-box" class="error-msg"></div>

    <div class="form-group">
        <label>Tên đăng nhập</label>
        <input type="text" id="user" placeholder="admin" autofocus>
    </div>

    <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" id="pass" placeholder="••••••••">
    </div>

    <button id="login-btn" onclick="handleLogin()">ĐĂNG NHẬP</button>
</div>

<script>
async function handleLogin() {
    const userEl = document.getElementById('user');
    const passEl = document.getElementById('pass');
    const btn = document.getElementById('login-btn');
    const errorBox = document.getElementById('error-box');

    // Reset trạng thái
    errorBox.style.display = 'none';
    const user = userEl.value.trim();
    const pass = passEl.value.trim();

    if (!user || !pass) {
        showError("Vui lòng nhập đầy đủ tài khoản và mật khẩu");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Đang xác thực...";

    // Lưu ý: Cần xử lý bảo mật mật khẩu ở phía Server (MD5/Bcrypt) thay vì gửi thẳng SQL
    const sql = `SELECT ID, user_login FROM wp_users WHERE user_login='${user}' AND user_pass='${pass}'`; 
    
    try {
        const response = await fetch('https://quanlytiendosanxuat.technoup.info/api/api_lsx.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                token: '546464646432987986745546546876vvjh44444',
                sql: sql
            })
        });

        const result = await response.json();

        if (Array.isArray(result) && result.length > 0) {
            localStorage.setItem('user_logged', JSON.stringify(result[0]));
            window.location.href = 'index.html';
        } else {
            showError("Tài khoản hoặc mật khẩu không chính xác");
        }
    } catch (e) {
        showError("Lỗi kết nối máy chủ. Vui lòng thử lại.");
        console.error(e);
    } finally {
        btn.disabled = false;
        btn.innerText = "ĐĂNG NHẬP";
    }
}

function showError(msg) {
    const errorBox = document.getElementById('error-box');
    errorBox.innerText = msg;
    errorBox.style.display = 'block';
}

// Cho phép nhấn Enter để đăng nhập
document.addEventListener('keypress', function (e) {
    if (e.key === 'Enter') handleLogin();
});
</script>

</body>
</html>
